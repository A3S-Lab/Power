name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            features: ""
          - label: hf+hw-verify
            features: "--features hf,hw-verify"
          - label: picolm
            features: "--no-default-features --features picolm"
          - label: hf-only
            features: "--no-default-features --features hf"
          - label: llamacpp
            features: "--no-default-features --features llamacpp"
            native_deps: true
          - label: tee-minimal
            features: "--no-default-features --features tee-minimal"
            native_deps: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.label }}
      - name: Install native build dependencies
        if: matrix.native_deps == true
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake
      - run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

  test:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            args: "--lib"
          - label: all-features
            args: "--all-features --lib"
            native_deps: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.label }}
      - name: Install native build dependencies
        if: matrix.native_deps == true
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake
      - run: cargo test ${{ matrix.args }}

  cross-build:
    name: Cross (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --target ${{ matrix.target }} --features hf,hw-verify
